name: Build and Publish Artifact

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        java-version: [ '8' ]

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ matrix.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ matrix.java-version }}
        distribution: 'adopt'
        cache: maven

    - name: Build with Maven
      run: mvn clean install -X
      
    - name: Check for errors
      run: |
        if [ ! -d "target" ]; then
          echo "❌ Build failed: target directory not found"
          exit 1
        fi
        
        if [ ! -f "target/FFA-Core-Plus-1.2.jar" ]; then
          echo "❌ Build failed: JAR file (FFA-Core-Plus-1.2.jar) not found"
          ls -la target/
          exit 1
        fi
        
        echo "✅ Build completed successfully"

    - name: Verify build artifacts
      run: |
        echo "Build artifacts:"
        ls -lh target/*.jar 2>/dev/null || echo "No JAR files found"
        
    - name: Upload artifact (Push event)
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: FFA-Core-Plus-build-${{ github.run_number }}
        path: target/*.jar
        if-no-files-found: error
        retention-days: 30

    - name: Upload artifact (Pull Request)
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: FFA-Core-Plus-PR-${{ github.event.pull_request.number }}
        path: target/*.jar
        if-no-files-found: warn
        retention-days: 7

    - name: Upload Release Asset
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: target/*.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Summary
      if: always()
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Run Number**: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        if [ -f "target/FFA-Core-Plus-1.2.jar" ]; then
          echo "- **Artifact**: ✅ Generated successfully" >> $GITHUB_STEP_SUMMARY
        else
          echo "- **Artifact**: ❌ Not found" >> $GITHUB_STEP_SUMMARY
        fi
